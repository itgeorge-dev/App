<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Layout{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'itmain/css/main.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="page-wrap">
        <aside>
            <div class="logo-container">
                <img src="{% static 'itmain/img/image4.jpg' %}" alt="Лого" class="logo-img">

                <header class="logo">Itgeorge</header>

            </div>

            <h3>Navigation</h3>

            <ul>
                <li><a href="{% url 'home' %}"><i class="fas fa-house"></i> Main</a></li>
                <li><a href="{% url 'about' %}"><i class="fas fa-user"></i> About us</a></li>
                <li><a href="{% url 'news' %}"><i class="fas fa-paper-plane"></i> News</a></li>
                <li><a href="{% url 'create' %}"><i class="fas fa-plus"></i> Add post</a></li>
            </ul>
        </aside>

        <main>
            {% block content %}
            {% endblock %}
        </main>
    </div>
</body>
</html>
